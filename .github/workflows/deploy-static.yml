name: Deploy Static Portfolio

on:
  push:
    branches:
      - main
    paths:
      - 'myportfilo/**'
      - '.github/workflows/deploy-static.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy static site to gh-pages-static
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./myportfilo
          publish_branch: gh-pages-static
          force_orphan: true
