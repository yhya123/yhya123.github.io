name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # أو اسم الفرع الرئيسي لديك

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: subosito/flutter-action@v2
        with:
          # قمنا بتغيير القناة إلى beta لضمان الحصول على SDK حديث يتوافق مع متطلبات مشروعك
          channel: 'beta' 
          # أو يمكنك تحديد إصدار فلاتر الذي تستخدمه في جهازك بالضبط لضمان التطابق
          # flutter-version: '3.44.0-0.3.pre' 

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        # استبدل yhya123.github.io باسم مستودعك إذا كان مختلفاً
        run: flutter build web --release --base-href "/yhya123.github.io/"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web